name: GitHub-Profile-3D-Contrib
on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-3d-contrib
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: yoshi389111/github-profile-3d-contrib@1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN }}
          USERNAME: ${{ github.repository_owner }}
      - name: Commit & Push
        run: |
          git config user.name KHJun99
          git config user.email KHJun99@github.com
          git add -A .
          git commit -m "generated" || true
          git pull --rebase
          git push
